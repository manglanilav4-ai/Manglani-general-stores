<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manglani General Store</title>
  

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()"><div class="product">
  <h3>Rice</h3>
</div>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#f5f7fa;}

header{
background:#2c7be5;
color:#fff;
padding:15px;
text-align:center;
}

header h1{font-size:22px;}
header p{font-size:14px;}

.filters{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
background:#fff;
}

.filters button{
padding:8px 12px;
border:none;
background:#e3e7ee;
border-radius:20px;
cursor:pointer;
}

.filters button.active{background:#2c7be5;color:#fff;}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.card h4{font-size:14px;margin:5px 0;}
.card p{font-size:12px;color:#666;}
.card .price{font-weight:bold;margin:5px 0;}

.card button{
width:100%;
padding:8px;
background:#28a745;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d4d;
color:#fff;
padding:15px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:#000;
color:#fff;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

.cart{
position:fixed;
bottom:0;
left:0;
width:100%;
height:80%;
background:#fff;
transform:translateY(100%);
transition:0.3s;
overflow:auto;
padding:10px;
}

.cart.active{transform:translateY(0);}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.qty button{
padding:5px;
}

.total{
font-weight:bold;
margin-top:10px;
}

form input, form textarea{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:5px;
}

form button{
background:#2c7be5;
color:#fff;
padding:10px;
border:none;
width:100%;
margin-top:10px;
}

.whatsapp{
position:fixed;
bottom:80px;
right:20px;
background:#25D366;
color:#fff;
padding:10px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<header>
<h1>Manglani General Store</h1>
<p>The Complete Shop</p>
</header>

<div class="filters">
<button onclick="filter('All')" class="active">All</button>
<button onclick="filter('Groceries')">Groceries</button>
<button onclick="filter('Dairy')">Dairy</button>
<button onclick="filter('Snacks')">Snacks</button>
<button onclick="filter('Beverages')">Beverages</button>
</div>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span class="cart-count" id="count">0</span>
</div>

<div class="whatsapp">
<a href="https://wa.me/917879117042" style="color:white;text-decoration:none;">💬</a>
</div>

<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<div class="total" id="total"></div>

<form action="https://formspree.io/f/mrejbrop" method="POST" onsubmit="prepareOrder()">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Delivery Address" required></textarea>
<textarea name="note" placeholder="Instructions"></textarea>

<input type="hidden" name="order" id="orderData">

<button type="submit">Place Order</button>
</form>
</div>

<script>

let products = [
{name:"Aashirvaad Atta",price:280,cat:"Groceries",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Premium atta"},
{name:"Amul Butter",price:280,cat:"Dairy",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Fresh butter"},
{name:"Milk Packet",price:60,cat:"Dairy",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Fresh milk"},
{name:"Maggi",price:15,cat:"Snacks",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Instant noodles"},
{name:"Biscuit",price:20,cat:"Snacks",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Tasty biscuit"},
{name:"Coca Cola",price:40,cat:"Beverages",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Cold drink"},
{name:"Pepsi",price:40,cat:"Beverages",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Soft drink"},
{name:"Rice",price:50,cat:"Groceries",img:"https://i.ibb.co/mVG1dsYj/17777034790544190107798749411598.jpg",desc:"Best quality"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProducts(list){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}" loading="lazy">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<div class="price">₹${p.price}</div>
<button onclick="addToCart(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function filter(cat){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(cat==="All"){renderProducts(products);}
else{
renderProducts(products.filter(p=>p.cat===cat));
}
}

function addToCart(i){
let item = products[i];
let exist = cart.find(c=>c.name===item.name);

if(exist){exist.qty++;}
else{cart.push({...item,qty:1});}

updateCart();
}

function updateCart(){
localStorage.setItem("cart",JSON.stringify(cart));

document.getElementById("count").innerText=cart.length;

let html="";
let total=0;

cart.forEach((c,i)=>{
total+=c.price*c.qty;
html+=`
<div class="cart-item">
<div>
${c.name} x ${c.qty}<br>₹${c.price*c.qty}
</div>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="changeQty(${i},1)">+</button>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function changeQty(i,delta){
cart[i].qty+=delta;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function prepareOrder(){
let text="";
cart.forEach(c=>{
text+=`${c.name} x ${c.qty} = ₹${c.price*c.qty}\n`;
});
document.getElementById("orderData").value=text;
localStorage.removeItem("cart");
}

renderProducts(products);
updateCart();

</script>
<script>
function searchProducts() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let products = document.getElementsByClassName("product");

  for (let i = 0; i < products.length; i++) {
    let text = products[i].innerText.toLowerCase();

    if (text.includes(input)) {
      products[i].style.display = "block";
    } else {
      products[i].style.display = "none";
    }
  }
}
</script>
</body>
</html>
